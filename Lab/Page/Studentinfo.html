<!DOCTYPE html>
<html>
<head>
    <title>Student Information</title>
    <link rel="stylesheet" href="D:\webTech\WebTech Lab\MID\Lab\Design\design.css">
</head>

<body>

<h2>Student Information</h2>

<form>

<table>
<tr>
    <td>Full Name</td>
    <td><input type="text" placeholder="Enter your full name"></td>

    <td>Email Address</td>
    <td><input type="email" placeholder="Enter your email"></td>
</tr>

<tr>
    <td>Password</td>
    <td><input type="password" placeholder="Enter your password"></td>

    <td>Age</td>
    <td><input type="number" placeholder="Enter your age"></td>
</tr>

<tr>
    <td>Experiment Date</td>
    <td><input type="date"></td>

    <td>Phone Number</td>
    <td><input type="tel" placeholder="+880XXXXXXXXXX"></td>
</tr>

</table>
<tr>
    <td colspan="2">
        <center>
            <input type="submit" value="SUBMIT">
            <input type="reset" value="CLEAR">
        </center>
    </td>
</tr>

</form>

</body>
</html>
